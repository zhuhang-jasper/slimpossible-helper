name: Create production tag and release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  main_push_create-tag-release:
    name: Create tag, release, changelog
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Check if version was incremented
      id: verify_semver_increment
      run: |
        CURRENT=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")
        echo "VERSION=$CURRENT" >> $GITHUB_OUTPUT
        # Compare with tip of master *before* this push (works for 1, 2, or N commits)
        git show ${{ github.event.before }}:package.json > prev_package.json 2>/dev/null || true
        if [ -f prev_package.json ]; then
          PREV=$(node -p "JSON.parse(require('fs').readFileSync('prev_package.json','utf8')).version")
        else
          PREV=""
        fi
        CHANGED=$(node -e "
          const cur = process.argv[1];
          const prev = process.argv[2];
          if (!prev) {
            console.log('false');
            process.exit(0);
          }
          const parse = (v) => v.split('.').map((n) => Number(n) || 0);
          const gt = (a, b) => {
            const A = parse(a);
            const B = parse(b);
            for (let i = 0; i < 3; i += 1) {
              if (A[i] > B[i]) return true;
              if (A[i] < B[i]) return false;
            }
            return false;
          };
          console.log(gt(cur, prev) ? 'true' : 'false');
        " "$CURRENT" "$PREV")
        if [ "$CHANGED" = "true" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Version incremented: $PREV → $CURRENT"
        else
          echo "changed=false" >> $GITHUB_OUTPUT
          if [ -z "$PREV" ]; then
            echo "No prior package.json on master; skipping tag (bump semver to release)"
          else
            echo "Version unchanged: $CURRENT (skipping tag and release)"
          fi
        fi

    - name: Create and push tag
      if: steps.verify_semver_increment.outputs.changed == 'true'
      id: create_tag
      run: |
        VERSION="${{ steps.verify_semver_increment.outputs.VERSION }}"
        # Tag format: v{major}.{minor}.{patch} (no suffix)
        TAG="v${VERSION}"
        echo "full_tag=$TAG" >> $GITHUB_OUTPUT
        echo "Tag: $TAG"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -f "$TAG"
        git push origin "$TAG" --force
        echo "Pushed tag $TAG to origin"

    - name: Build release notes
      if: steps.verify_semver_increment.outputs.changed == 'true'
      id: release_notes
      run: |
        TAG="${{ steps.create_tag.outputs.full_tag }}"
        REPO="${{ github.repository }}"
        PREV=$(git describe --tags --abbrev=0 --exclude="$TAG" HEAD 2>/dev/null || true)
        if [ -n "$PREV" ]; then
          BODY="**Full Changelog**: https://github.com/${REPO}/compare/${PREV}...${TAG}"
        else
          BODY="**Full Changelog**: https://github.com/${REPO}/releases/tag/${TAG}"
        fi
        echo "body=$BODY" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      if: steps.verify_semver_increment.outputs.changed == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.create_tag.outputs.full_tag }}
        name: ${{ steps.create_tag.outputs.full_tag }}
        body: ${{ steps.release_notes.outputs.body }}
        generate_release_notes: false
        draft: false
