# Composite: Node version from .nvmrc, optional npm ci
name: "Setup Node (.nvmrc)"
description: "Setup Node using .nvmrc; optionally install dependencies with npm ci"
inputs:
  perform_npm_ci:
    description: "Run npm ci after Node setup"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
  - uses: actions/setup-node@v5
    with:
      node-version-file: ".nvmrc"

  - name: Install dependencies
    if: inputs.perform_npm_ci == 'true'
    shell: bash
    run: npm ci
